<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Tunnel</title>
    <style>
        /* --- CSS DEFAULT STYLES --- */
        :root {
            /* These are updated by JavaScript on load based on the DEFAULTS object */
            --logo-size: 35vmin;
            --logo-color: #44c8f5;
            --logo-opacity: 1;
        }

        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden; /* Prevent scrolling */
            font-family: monospace;
        }

        /* Canvas spanning the full viewport */
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Behind the logo */
        }

        /* Centered Logo Container */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; /* In front of the canvas */
            
            /* Responsive sizing: scales based on viewport minimum dimension */
            width: var(--logo-size);
            height: var(--logo-size);
            max-width: 400px;
            max-height: 400px;
            opacity: var(--logo-opacity);
            
            transition: transform 0.3s ease, width 0.3s, height 0.3s, opacity 0.3s;
        }

        /* Settings Panel */
        #settings-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 255, 65, 0.4);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            color: #ccc;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #settings-panel:hover {
            opacity: 1;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            font-size: 13px;
        }
        
        .setting-row input[type="range"] {
            width: 100px;
            cursor: pointer;
        }
        
        .setting-row input[type="color"] {
            background: none;
            border: none;
            cursor: pointer;
            width: 28px;
            height: 28px;
            padding: 0;
        }

        /* Checkbox styling */
        .setting-row input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        /* Select Dropdown Styling */
        .setting-row select {
            width: 105px;
            background: rgba(0, 0, 0, 0.8);
            color: #00FF41;
            border: 1px solid rgba(0, 255, 65, 0.5);
            border-radius: 4px;
            padding: 3px;
            font-family: monospace;
            cursor: pointer;
            outline: none;
            transition: color 0.3s, border-color 0.3s;
        }

        .setting-row select option {
            background: #111;
        }

        /* Optional hover effect on the logo */
        .logo-container:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* Make sure SVG/Img takes full width of container */
        .logo-container svg, 
        .logo-container img {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 3D Particle Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Logo overlaying the canvas -->
    <div class="logo-container">
        <!-- Embedded SVG -->
        <svg id="Logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64.9 72.2">
          <path d="M60.5,14.8L36.9,1.2c-2.7-1.6-6.1-1.6-8.9,0L4.4,14.8c-2.7,1.6-4.4,4.5-4.4,7.7v27.2c0,3.2,1.7,6.1,4.4,7.7l23.6,13.6c2.7,1.6,6.1,1.6,8.9,0l23.6-13.6c2.7-1.6,4.4-4.5,4.4-7.7v-27.2c.1-3.2-1.6-6.1-4.4-7.7ZM24.1,23.7c-1.8,0-2.8.2-3.2.6-.3.4-.5,1.1-.6,2.1-.1,2.9-.2,4.8-.3,5.7-.1.9-.4,1.7-.8,2.5s-1.2,1.6-2.4,2.3c1.1.7,1.9,1.5,2.4,2.4s.8,2.2.9,3.9l.3,5.3c.1.5.4.9.8,1.2.4.2,1.3.4,2.8.4v4.4h-1c-1.9,0-3.4-.2-4.5-.6-1.1-.4-1.8-1.2-2.3-2.2s-.7-2.7-.7-4.9c0-2.5-.1-4.1-.3-4.8-.2-.7-.5-1.3-1-1.9-.5-.6-1.4-.9-2.7-.9v-4.4c1.3,0,2.3-.4,3-1.2s1-2.5,1-5.2c0-2,.1-3.6.2-4.6s.5-1.8,1.1-2.5,1.3-1.2,2.3-1.5c.9-.3,2.2-.4,3.9-.4h1v4.3h.1ZM53.4,39.1c-1.4,0-2.3.4-3,1.2s-1,2.5-1,5.2c0,2-.1,3.6-.2,4.6-.1,1-.5,1.8-1.1,2.5s-1.3,1.1-2.3,1.5c-.9.3-2.2.4-3.9.4h-1v-4.4c1.7,0,2.8-.2,3.2-.5.4-.3.6-1.1.6-2.2.1-3.1.2-5.1.3-6,.2-.9.5-1.7.9-2.5.5-.8,1.2-1.4,2.2-2-1-.7-1.8-1.4-2.2-2-.4-.7-.7-1.4-.8-2.2-.1-.7-.2-2.2-.3-4.3-.1-2.1-.2-3.3-.3-3.6-.1-.3-.3-.6-.7-.8-.4-.2-1.3-.3-2.9-.3v-4.4h1c2,0,3.5.2,4.5.7,1.1.4,1.9,1.2,2.3,2.2.5,1,.7,2.6.7,4.9,0,2.6.1,4.2.3,4.9.2.6.5,1.3,1,1.8.5.6,1.4.8,2.7.9v4.4Z" style="fill: var(--logo-color); stroke-width: 0px;"/>
        </svg>
    </div>

    <!-- Live Settings Panel -->
    <div id="settings-panel">
        <div style="font-weight: bold; margin-bottom: 5px; text-align: center;">Controls</div>
        <div class="setting-row">
            <label>Tunnel Shape</label>
            <select id="tunnelTypeInput">
                <option value="cylinder">Cylinder</option>
                <option value="spiral">Spiral Tunnel</option>
                <option value="square">Square Box</option>
                <option value="grid">Quantum Grid</option>
                <option value="chaos">Chaos Warp</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Color Cycle</label>
            <input type="checkbox" id="cycleToggle">
        </div>
        <div class="setting-row">
            <label>Bit Color</label>
            <input type="color" id="bitsColorInput">
        </div>
        <div class="setting-row">
            <label>Tunnel Speed</label>
            <input type="range" id="speedInput" min="0" max="20" step="0.5">
        </div>
        <div class="setting-row">
            <label>Logo Size</label>
            <input type="range" id="sizeInput" min="10" max="80" step="1">
        </div>
        <div class="setting-row">
            <label>Logo Color</label>
            <input type="color" id="logoColorInput">
        </div>
        <div class="setting-row">
            <label>Logo Opacity</label>
            <input type="range" id="logoOpacityInput" min="0" max="1" step="0.05">
        </div>
    </div>

    <script>
        /**
         * --- EDIT DEFAULTS HERE ---
         * Changing these values will update the initial load state of the Canvas.
         */
        const DEFAULTS = {
            tunnelShape: 'square',        // 'cylinder', 'spiral', 'square', 'grid', 'chaos'
            bitColor: '#00FF41',          // Primary color for ones and zeros
            bitColorCycle: true,          // Whether color cycling starts enabled
            tunnelSpeed: 8.0,             // Initial speed of movement
            logoSize: 45,                 // Percentage of vmin (10-80)
            logoColor: '#808080',         // Hex color of the logo
            logoOpacity: 0.45,             // Opacity of the logo (0.0 - 1.0)
            particleCount: 2500           // Total number of bits in the tunnel
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let currentTunnelShape = DEFAULTS.tunnelShape;
        let colorCycleActive = DEFAULTS.bitColorCycle;
        let currentHue = 140; // Internal tracker for cycling
        
        // --- LIVE CONFIGURATION INITIALIZATION ---
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }
        
        // Sync UI and CSS with DEFAULTS object
        function applyDefaults() {
            // Sync HTML Inputs
            document.getElementById('tunnelTypeInput').value = DEFAULTS.tunnelShape;
            document.getElementById('cycleToggle').checked = DEFAULTS.bitColorCycle;
            document.getElementById('bitsColorInput').value = DEFAULTS.bitColor;
            document.getElementById('speedInput').value = DEFAULTS.tunnelSpeed;
            document.getElementById('sizeInput').value = DEFAULTS.logoSize;
            document.getElementById('logoColorInput').value = DEFAULTS.logoColor;
            document.getElementById('logoOpacityInput').value = DEFAULTS.logoOpacity;
            
            // Sync CSS Variables
            document.documentElement.style.setProperty('--logo-size', `${DEFAULTS.logoSize}vmin`);
            document.documentElement.style.setProperty('--logo-color', DEFAULTS.logoColor);
            document.documentElement.style.setProperty('--logo-opacity', DEFAULTS.logoOpacity);
            
            // Initial color calculation
            particleColorString = `rgb(${hexToRgb(DEFAULTS.bitColor)})`;
            document.getElementById('bitsColorInput').disabled = DEFAULTS.bitColorCycle;
            
            // Sync UI Border
            const rgb = hexToRgb(DEFAULTS.bitColor);
            document.getElementById('settings-panel').style.borderColor = `rgba(${rgb}, 0.5)`;
        }

        let particleColorString = '';
        applyDefaults();
        
        // UI Event Listeners
        document.getElementById('cycleToggle').addEventListener('change', (e) => {
            colorCycleActive = e.target.checked;
            document.getElementById('bitsColorInput').disabled = colorCycleActive;
        });

        document.getElementById('tunnelTypeInput').addEventListener('change', (e) => {
            currentTunnelShape = e.target.value;
            for(let i = 0; i < particles.length; i++) {
                particles[i].reset(false, true); 
            }
        });

        document.getElementById('bitsColorInput').addEventListener('input', (e) => {
            if (colorCycleActive) return;
            const hex = e.target.value;
            const rgb = hexToRgb(hex);
            particleColorString = `rgb(${rgb})`;
            document.getElementById('settings-panel').style.borderColor = `rgba(${rgb}, 0.5)`;
            const selectEl = document.getElementById('tunnelTypeInput');
            selectEl.style.borderColor = `rgba(${rgb}, 0.5)`;
            selectEl.style.color = hex;
        });
        
        document.getElementById('speedInput').addEventListener('input', (e) => {
            config.speed = parseFloat(e.target.value);
            for(let i = 0; i < particles.length; i++) {
                particles[i].speed = config.speed + (Math.random() * 2);
            }
        });
        
        document.getElementById('sizeInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--logo-size', `${e.target.value}vmin`);
        });
        
        document.getElementById('logoColorInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--logo-color', e.target.value);
        });

        document.getElementById('logoOpacityInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--logo-opacity', e.target.value);
        });

        // --- TUNNEL SETTINGS ---
        const config = {
            particleCount: DEFAULTS.particleCount,   
            speed: DEFAULTS.tunnelSpeed, 
            fieldOfView: 600,      
            maxZ: 2500,            
            rotationSpeed: 0.001   
        };

        let tunnelAngle = 0; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false, keepZ = false) {
                this.shape = currentTunnelShape;
                const maxR = 1200; 
                const minR = 250;  

                if (this.shape === 'cylinder' || this.shape === 'spiral') {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = Math.random() * (maxR - minR) + minR; 
                    
                    if (this.shape === 'spiral') {
                        this.orbitSpeed = (Math.random() * 0.005 + 0.002);
                    }

                    this.x = Math.cos(this.angle) * this.radius;
                    this.y = Math.sin(this.angle) * this.radius;

                } else if (this.shape === 'square') {
                    const wall = Math.floor(Math.random() * 4);
                    const spread = (Math.random() - 0.5) * maxR * 1.5;
                    const depth = minR + Math.random() * 200; 
                    
                    if (wall === 0) { this.x = spread; this.y = -depth; }
                    else if (wall === 1) { this.x = spread; this.y = depth; }
                    else if (wall === 2) { this.x = -depth; this.y = spread; }
                    else { this.x = depth; this.y = spread; }

                } else if (this.shape === 'grid') {
                    const step = 150;
                    this.x = Math.round(((Math.random() - 0.5) * maxR * 2) / step) * step;
                    this.y = Math.round(((Math.random() - 0.5) * maxR * 2) / step) * step;
                    
                    if (Math.abs(this.x) < minR && Math.abs(this.y) < minR) {
                        this.x = (Math.random() > 0.5 ? 1 : -1) * (minR + step);
                    }
                    this.gridSpeedMult = Math.random() * 2.5 + 0.2;

                } else if (this.shape === 'chaos') {
                    this.x = (Math.random() - 0.5) * maxR * 2;
                    this.y = (Math.random() - 0.5) * maxR * 2;
                    this.chaosVx = (Math.random() - 0.5) * 15;
                    this.chaosVy = (Math.random() - 0.5) * 15;
                }
                
                if (!keepZ) {
                    this.z = initial ? Math.random() * config.maxZ : config.maxZ;
                }
                
                this.char = Math.random() > 0.5 ? '1' : '0';
                this.speed = config.speed + (Math.random() * 2); 
                this.isWhite = Math.random() < 0.05; 
            }

            update() {
                if (this.shape === 'spiral') {
                    this.angle += this.orbitSpeed * (config.speed * 0.2);
                    this.x = Math.cos(this.angle) * this.radius;
                    this.y = Math.sin(this.angle) * this.radius;
                } else if (this.shape === 'chaos') {
                    this.x += Math.sin(this.z * 0.02) * this.chaosVx;
                    this.y += Math.cos(this.z * 0.02) * this.chaosVy;
                    if(Math.random() < 0.05) this.char = Math.random() > 0.5 ? '1' : '0';
                } else if (this.shape === 'grid') {
                    if(Math.random() < 0.1) this.char = Math.random() > 0.5 ? '1' : '0';
                }

                let currentSpeed = this.speed;
                if (this.shape === 'grid') currentSpeed *= this.gridSpeedMult;

                this.z -= currentSpeed;

                if (this.z <= 1) {
                    this.reset(); 
                }
            }

            draw() {
                let finalX = this.x;
                let finalY = this.y;
                let currentAngle = tunnelAngle;

                if (this.shape === 'spiral') {
                    currentAngle += this.z * 0.0015; 
                }

                const rx = finalX * Math.cos(currentAngle) - finalY * Math.sin(currentAngle);
                const ry = finalX * Math.sin(currentAngle) + finalY * Math.cos(currentAngle);

                const scale = config.fieldOfView / this.z;
                const screenX = (rx * scale) + width / 2;
                const screenY = (ry * scale) + height / 2;

                const size = Math.floor(scale * 25); 
                if (size < 1) return; 

                const distanceRatio = this.z / config.maxZ;
                let opacity = 1 - distanceRatio;

                ctx.globalAlpha = this.isWhite ? Math.min(1, opacity * 1.5) : Math.max(0, opacity);
                ctx.font = `${size}px monospace`;
                
                ctx.fillStyle = this.isWhite ? '#ffffff' : particleColorString;
                ctx.fillText(this.char, screenX, screenY);
            }
        }

        for (let i = 0; i < config.particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            // Update color cycling if enabled
            if (colorCycleActive) {
                currentHue = (currentHue + 0.5) % 360;
                particleColorString = `hsl(${currentHue}, 100%, 50%)`;
                
                // Keep UI borders in sync with the cycle
                const accent = `hsla(${currentHue}, 100%, 50%, 0.5)`;
                document.getElementById('settings-panel').style.borderColor = accent;
                const selectEl = document.getElementById('tunnelTypeInput');
                selectEl.style.borderColor = accent;
                selectEl.style.color = `hsl(${currentHue}, 100%, 50%)`;
            }

            ctx.globalAlpha = 1;
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (currentTunnelShape === 'grid' || currentTunnelShape === 'square') {
                tunnelAngle *= 0.95; 
            } else {
                tunnelAngle += config.rotationSpeed;
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
